# FutureKawa — full-stack compose (the "run the whole project" entrypoint).
#
# One `docker compose up` brings up the COMPLETE system end-to-end for a
# demo/jury: the per-country EDGE stack for one country (Brazil) plus the
# central HQ layer, all on a single Docker network and wired together.
#
#   Country edge (via include of apps/country/docker-compose.yml):
#     mosquitto        broker         :1883
#     iot-simulator    MQTT publisher
#     country-db       postgres:16
#     country-api      Symfony API    :8000
#     ingest-worker    MQTT -> DB consumer
#   HQ (defined here):
#     backend          aggregator/BFF :3000  -> http://country-api:8000
#     frontend         React SPA      :8080  -> backend
#   Plus:
#     migrate          one-shot Doctrine migration (creates tables, then exits)
#
# Quick start:
#   docker login ghcr.io            # images are private GHCR packages
#   cp .env.example .env            # set APP_SECRET, DB_PASSWORD, keys...
#   docker compose up -d --build    # whole system, one command
#
# The per-country edge stack is reused verbatim from apps/country/ (never
# duplicated). Overrides below only add HQ wiring and the migration ordering.

name: futurekawa

# Reuse the per-country edge stack as-is (broker + simulator + API + DB + worker).
# Its services join THIS project's default network, so HQ can reach them by name.
include:
  - path: apps/country/docker-compose.yml

services:
  # One-shot Doctrine migration -- creates the country DB schema before the API
  # and worker touch it. Same image as country-api, run as a console command,
  # then exits. Idempotent: re-running against a migrated DB is a no-op.
  migrate:
    image: ${REGISTRY:-ghcr.io/epsi-teamsyct}/futurekawa-country-api:${IMAGE_TAG:-latest}
    build: ./apps/country/api
    restart: "no"
    # The prod image ships no /app/.env, but the Symfony runtime's bootEnv still
    # looks for one. Create an empty stub, then migrate. (Env vars already carry
    # all config; this only satisfies the dotenv file probe.)
    command: ["sh", "-c", "touch .env && php bin/console doctrine:migrations:migrate --no-interaction"]
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET:?set APP_SECRET in .env}
      # serverVersion is required here: the prod image ships no /app/.env (which
      # normally carries it), and doctrine.yaml leaves server_version commented,
      # so Doctrine must read the Postgres version from the URL.
      DATABASE_URL: postgresql://${DB_USER:-futurekawa}:${DB_PASSWORD}@country-db:5432/${DB_NAME:-futurekawa}?serverVersion=16&charset=utf8
    depends_on:
      country-db:
        condition: service_healthy

  # NOTE on ordering: Compose `include:` imports country-api / ingest-worker as
  # sealed resources -- they cannot be given an extra `depends_on: migrate` from
  # here without a conflict. Both already wait for country-db to be healthy, and
  # `migrate` runs the moment the DB is up. The migration is quick and idempotent,
  # so the schema lands within a second or two of the API booting; FrankenPHP
  # serves fine in the meantime and the ingest worker retries. For a strictly
  # ordered start, run `docker compose up -d migrate` first (see the deploy doc).

  # HQ backend -- aggregator/BFF over the country API(s).
  backend:
    image: ${REGISTRY:-ghcr.io/epsi-teamsyct}/futurekawa-hq-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      LOG_LEVEL: info
      COUNTRY_API_KEY: ${COUNTRY_API_KEY:-change-me}
      COUNTRY_TIMEOUT_MS: "4000"
      CACHE_STALE_MS: "300000"
      # Single-URL mode (as built on main today): point at the in-network API.
      COUNTRY_API_URL: ${COUNTRY_API_URL:-http://country-api:8000}
      # --- 3-country target (needs the in-flight multi-URL backend change) ---
      # Uncomment when the backend reads one URL per country and merges. Only
      # the Brazil edge runs in this compose; ecuador/colombia are placeholders.
      # COUNTRY_API_URL_BRAZIL: http://country-api:8000
      # COUNTRY_API_URL_ECUADOR: http://country-api-ecuador:8000
      # COUNTRY_API_URL_COLOMBIA: http://country-api-colombia:8000
    depends_on:
      country-api:
        condition: service_started

  # HQ frontend -- React SPA served by nginx.
  # NOTE: the published image is built with VITE_USE_MOCKS=true, so it runs on its
  # offline MSW mock layer by default (great for the jury demo, ignores backend).
  # To hit the real backend, rebuild: --build-arg VITE_USE_MOCKS=false
  #   --build-arg VITE_API_URL=http://localhost:3000
  frontend:
    image: ${REGISTRY:-ghcr.io/epsi-teamsyct}/futurekawa-hq-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - backend
