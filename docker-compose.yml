  #   image: ${REGISTRY:-ghcr.io/epsi-teamsyct}/futurekawa-country-api:${IMAGE_TAG:-latest}
  #   restart: unless-stopped
  #   environment:
  #     APP_ENV: prod
  #     API_KEY: ${COUNTRY_API_KEY:-change-me}
  #     DATABASE_URL: postgresql://futurekawa:futurekawa@db-brazil:5432/futurekawa
  #   depends_on: [db-brazil]
  # db-brazil:
  #   image: postgres:16-alpine
  #   environment: { POSTGRES_USER: futurekawa, POSTGRES_PASSWORD: futurekawa, POSTGRES_DB: futurekawa }
  #   volumes: [db-brazil-data:/var/lib/postgresql/data]
  #
  # stack-ecuador / db-ecuador  — same shape, COUNTRY=ecuador
  # stack-colombia / db-colombia — same shape, COUNTRY=colombia

