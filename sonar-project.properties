# SonarCloud analysis scope.
# Exclude generated files and build artefacts from analysis.
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/mockServiceWorker.js,**/*.min.js

# Test files should not count towards duplication/coverage on themselves.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
