name: Feature
description: A new feature or enhancement
title: "feat: "
labels: ["type:feat"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is this feature, in 1-2 sentences?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation / user value
      description: Why does it matter? Who benefits?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's done? Use a checklist.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes / context
      description: Links, related issues, design notes, screenshots.
