name: Release

# Runs when a PR is merged into main. Derives the version bump from the source
# branch name (feat/feature -> minor, fix -> patch, else none) and builds/pushes
# the image of every changed service. Branch name comes from the PR event, so it
# works even with squash-merges.
on:
  pull_request:
    types: [closed]

jobs:
  meta:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.bump.outputs.bump }}
      simulator: ${{ steps.filter.outputs.simulator }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine bump from branch name
        id: bump
        env:
          # Passed as an env var (never interpolated into the script) to avoid
          # shell injection — a branch name is attacker-controllable.
          HEAD_REF: ${{ github.head_ref }}
        run: |
          case "$HEAD_REF" in
            feat/*|feature/*) bump=minor ;;
            fix/*)            bump=patch ;;
            *)                bump=none  ;;
          esac
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "branch=$HEAD_REF -> bump=$bump"

      # Which services had image-relevant changes (src/deps/Dockerfile)?
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            simulator:
              - 'apps/country/iot/simulator/src/**'
              - 'apps/country/iot/simulator/pyproject.toml'
              - 'apps/country/iot/simulator/uv.lock'
              - 'apps/country/iot/simulator/Dockerfile'

  iot-simulator:
    needs: meta
    if: ${{ needs.meta.outputs.simulator == 'true' }}
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/cd-iot-simulator.yml
    with:
      bump: ${{ needs.meta.outputs.bump }}
    secrets: inherit
