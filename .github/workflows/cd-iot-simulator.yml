name: CD · iot-simulator (build & push)

# Reusable. Called by release.yml after a PR is merged to main.
# Builds the image and pushes it to GHCR. Creates a SemVer tag when bump != none.
on:
  workflow_call:
    inputs:
      bump:
        description: "minor | patch | none"
        required: true
        type: string

permissions:
  contents: write # push the version tag
  packages: write # push the image to GHCR

env:
  SERVICE: iot-simulator
  IMAGE: ghcr.io/epsi-teamsyct/futurekawa-iot-simulator
  CONTEXT: apps/country/iot/simulator

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # need the full tag history

      - name: Compute version & sha
        id: info
        run: |
          set -euo pipefail
          sha=$(git rev-parse --short HEAD)
          latest=$(git tag -l "${SERVICE}-v*" --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            major=0; minor=0; patch=0
          else
            v=${latest#${SERVICE}-v}
            major=${v%%.*}; rest=${v#*.}; minor=${rest%%.*}; patch=${rest##*.}
          fi
          case "${{ inputs.bump }}" in
            minor) minor=$((minor + 1)); patch=0; release=true ;;
            patch) patch=$((patch + 1));          release=true ;;
            *)                                    release=false ;;
          esac
          version="${major}.${minor}.${patch}"
          {
            echo "sha=$sha"
            echo "version=$version"
            echo "release=$release"
          } >> "$GITHUB_OUTPUT"
          echo "bump=${{ inputs.bump }} -> version=$version (release=$release), sha=$sha"

      - name: Create version tag
        if: ${{ steps.info.outputs.release == 'true' }}
        run: |
          set -euo pipefail
          tag="${SERVICE}-v${{ steps.info.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.info.outputs.sha }}
            type=raw,value=${{ steps.info.outputs.version }},enable=${{ steps.info.outputs.release == 'true' }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
