name: CD · hq-backend (build & push)

# Reusable. Called by release.yml after a PR is merged to main.
on:
  workflow_call:
    inputs:
      bump:
        description: "minor | patch | none"
        required: true
        type: string

permissions:
  contents: write # push the version tag
  packages: write # push the image to GHCR

env:
  SERVICE: hq-backend
  IMAGE: ghcr.io/epsi-teamsyct/futurekawa-hq-backend
  CONTEXT: apps/hq/backend

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0 # need the full tag history

      - name: Compute version & sha
        id: info
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          sha=$(git rev-parse --short HEAD)
          latest=$(git tag -l "${SERVICE}-v*" --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            major=0; minor=0; patch=0
          else
            v=${latest#${SERVICE}-v}
            major=${v%%.*}; rest=${v#*.}; minor=${rest%%.*}; patch=${rest##*.}
          fi
          case "$BUMP" in
            minor) minor=$((minor + 1)); patch=0; release=true ;;
            patch) patch=$((patch + 1));          release=true ;;
            *)                                    release=false ;;
          esac
          version="${major}.${minor}.${patch}"
          {
            echo "sha=$sha"
            echo "version=$version"
            echo "release=$release"
          } >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP -> version=$version (release=$release), sha=$sha"

      - name: Create version tag
        if: ${{ steps.info.outputs.release == 'true' }}
        env:
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          set -euo pipefail
          tag="${SERVICE}-v${VERSION}"
          git tag "$tag"
          git push origin "$tag"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.info.outputs.sha }}
            type=raw,value=${{ steps.info.outputs.version }},enable=${{ steps.info.outputs.release == 'true' }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ env.CONTEXT }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
