name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# One CI run per branch/PR; cancel superseded runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which services changed, so we only run the CI that matters.
  changes:
    name: detect changed services
    runs-on: ubuntu-latest
    outputs:
      simulator: ${{ steps.filter.outputs.simulator }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            simulator:
              - 'apps/country/iot/simulator/**'
              - '.github/workflows/ci-simulator.yml'
              - '.github/workflows/ci.yml'

  # One job per service, each calling its own reusable workflow.
  simulator:
    name: simulator
    needs: changes
    if: ${{ needs.changes.outputs.simulator == 'true' }}
    uses: ./.github/workflows/ci-simulator.yml
