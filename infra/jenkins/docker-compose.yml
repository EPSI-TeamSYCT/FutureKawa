# Local Jenkins controller to demonstrate the CD pipeline (proof of execution).
#   cp .env.example .env   # fill GHCR_* and GIT_* (a GitHub PAT)
#   docker compose up -d --build
#   open http://localhost:8081  (admin / $JENKINS_ADMIN_PASSWORD)
#
# Runs as root and mounts the host Docker socket so the pipeline can pull & deploy
# on the host daemon. For a LOCAL demo only — not a production Jenkins.
name: futurekawa-jenkins

services:
  jenkins:
    build: .
    container_name: futurekawa-jenkins
    user: root
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc.yaml
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
      GHCR_USER: ${GHCR_USER}
      GHCR_TOKEN: ${GHCR_TOKEN}
      GIT_USER: ${GIT_USER}
      GIT_TOKEN: ${GIT_TOKEN}
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./casc.yaml:/var/jenkins_home/casc.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
