# Mosquitto broker configuration — FutureKawa country edge.
#
# The broker is NOT published to the host in the production compose (no port
# mapping): only the ingest-worker and the IoT simulator reach it over the
# private Docker network. If you ever expose 1883 to the internet, switch
# `allow_anonymous` to false and configure a password_file + ACL + TLS.

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type notice
