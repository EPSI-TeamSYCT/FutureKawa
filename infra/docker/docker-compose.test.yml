# Stack de test : PostgreSQL + Mosquitto
# Le worker Symfony (app:mqtt:subscribe) tourne à part et se connecte ici.
# Lancer depuis infra/docker/ :  docker compose -f docker-compose.test.yml up --build
name: futurekawa-test

services:
  postgres:
    build: ./postgres          # ou:  image: postgres:16-alpine
    container_name: fk-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: "!ChangeMe!"   # identique à ton .env
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  mosquitto:
    build: ./mosquitto
    container_name: fk-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data

volumes:
  pgdata:
  mosquitto_data:
