server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # The entry HTML must never be cached.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Hashed build assets and self-hosted fonts are immutable.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
  location /fonts/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Real HQ backend, reverse-proxied so the SPA stays same-origin (no CORS).
  # Only exercised when the app runs with VITE_USE_MOCKS=false. Adjust the
  # upstream host to match your deployment (compose service name shown).
  location /hq/ {
    proxy_pass http://central-backend:3000/;
  }

  # SPA fallback — client-side routing (react-router).
  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml font/woff2;
}
