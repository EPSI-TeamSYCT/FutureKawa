<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="FutureKawa — supervision des lots de café vert et des conditions IoT des entrepôts (Brésil, Équateur, Colombie)."
    />
    <title>FutureKawa</title>

    <!-- Set the theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('fk-theme')
          if (t !== 'light' && t !== 'dark') t = 'light'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {
          /* localStorage unavailable — keep the light default from the markup. */
        }
      })()
    </script>

    <link rel="preload" href="/fonts/archivo-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/archivo-600.woff2" as="font" type="font/woff2" crossorigin />
    <link
      rel="preload"
      href="/fonts/ibm-plex-mono-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
