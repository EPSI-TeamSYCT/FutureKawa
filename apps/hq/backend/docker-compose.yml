services:
  central-backend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 3000
      COUNTRY_API_URL: http://host.docker.internal:8080
      COUNTRY_API_KEY: ${COUNTRY_API_KEY}
      COUNTRY_TIMEOUT_MS: 4000
      CACHE_STALE_MS: 300000
