services:
  central-backend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 3000
      # Point these at each country API once they run (host.docker.internal
      # reaches the host from inside the container). Configure only the
      # countries you run; the shared key authenticates all of them.
      COUNTRY_API_URL_BRAZIL: http://host.docker.internal:8081
      COUNTRY_API_URL_ECUADOR: http://host.docker.internal:8082
      COUNTRY_API_URL_COLOMBIA: http://host.docker.internal:8083
      COUNTRY_API_KEY: ${COUNTRY_API_KEY}
      COUNTRY_TIMEOUT_MS: 4000
      CACHE_STALE_MS: 300000

  # --- External services ---
  # The country APIs and the frontend are NOT managed here (other teams own
  # them). Point the per-country URLs/KEY at the country APIs above. Example if
  # the frontend were added to this compose:
  #
  # frontend:
  #   image: futurekawa/hq-frontend
  #   environment:
  #     API_URL: http://central-backend:3000
