# FutureKawa — per-country edge stack.
#
# Deploy ONE instance of this file per country (Brazil, Ecuador, Colombia): each
# country is sovereign and runs its own broker, sensors, ingest worker, API and
# database. Configuration is driven by an .env file (see .env.example) so the
# same compose ships to every country without code changes.
#
#   cp .env.example .env      # then set COUNTRY, DEVICES, thresholds
#   docker compose up -d
#
# Images are pulled from GHCR (ghcr.io/epsi-teamsyct/*). Private packages:
# `docker login ghcr.io` first, or make them public for the jury demo.

name: futurekawa-${COUNTRY:-country}

services:
  # MQTT broker — the country's local message bus.
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ../../infra/docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  # IoT layer — the sensor publisher (real hardware in prod; this simulator for
  # the demo). Publishes futurekawa/<country>/<warehouse>/measurements over MQTT.
  iot-simulator:
    image: ${REGISTRY:-ghcr.io/epsi-teamsyct}/futurekawa-iot-simulator:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      COUNTRY: ${COUNTRY:-brazil}
      DEVICES: ${DEVICES}
      TEMP_THRESHOLD: ${TEMP_THRESHOLD:-29}
      HUMIDITY_THRESHOLD: ${HUMIDITY_THRESHOLD:-55}
      PUBLISH_INTERVAL: ${PUBLISH_INTERVAL:-30}
    depends_on:
      - mosquitto

